<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Booty Clicker · Anatomy Edition</title>
    <meta name="description" content="Booty Clicker — Joke-Clicker-Game in Three.js." />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🍑%3C/text%3E%3C/svg%3E"
    />
  </head>
  <body>
    <canvas id="app"></canvas>
    <div class="fx vignette"></div>
    <div class="fx grain"></div>
    <div class="hud">
      <div class="bp"><span id="bp">0</span> BP</div>
      <div class="rate" id="rate">0 / Sek · +1 pro Shake</div>
      <div class="combo" id="combo"></div>
      <div class="move" id="moveName">TWERK</div>
      <div class="ngplus hidden" id="ngPlus"></div>
      <div class="boostbadge hidden" id="boostBadge">🍑 ×3 Boost!</div>
    </div>
    <button class="toggleShop" id="toggleShop">🛒 Shop</button>
    <button class="muteBtn" id="muteBtn" title="Ton an/aus">🔊</button>
    <button class="bossStart hidden" id="bossStart">👑 Tyrann herausfordern</button>
    <div class="hintbar">👆 Klick / Leertaste = Shaken · Klicken pusht Tempo &amp; Moves</div>
    <button class="peach hidden" id="peach" title="Fang mich!">🍑</button>
    <div class="toasts" id="toasts"></div>
    <div class="shop" id="shop">
      <div class="tabs">
        <div class="tab active" data-t="up">⚡ Upgrades</div>
        <div class="tab" data-t="sk">🕺 Skins</div>
        <div class="tab" data-t="bg">🌆 Kulisse</div>
        <div class="tab" data-t="ach">🏆</div>
        <div class="tab" data-t="set">⚙️</div>
      </div>
      <div class="tabbody" id="tabUp"></div>
      <div class="tabbody" id="tabSk" style="display: none"></div>
      <div class="tabbody" id="tabBg" style="display: none"></div>
      <div class="tabbody" id="tabAch" style="display: none"></div>
      <div class="tabbody" id="tabSet" style="display: none"></div>
    </div>
    <div class="overlay hidden" id="welcomeBack">
      <div class="dialog">
        <div class="dt">🍑 Willkommen zurück!</div>
        <div class="dd" id="wbText"></div>
        <button class="btn" id="wbClose">Einsammeln</button>
      </div>
    </div>
    <div class="boss-ui hidden" id="bossUi">
      <div class="boss-name">👑 Goldener Twerk-Tyrann</div>
      <div class="boss-hpbar"><div class="boss-hpfill" id="bossHpFill"></div></div>
      <div class="boss-row">
        <span class="boss-hint">👆 Klick / Leertaste = Angriff!</span>
        <span class="boss-timer" id="bossTimer">90</span>
      </div>
    </div>
    <div class="overlay hidden" id="bossResult">
      <div class="dialog">
        <div class="dt" id="bossResultTitle"></div>
        <div class="dd" id="bossResultText"></div>
        <button class="btn" id="bossResultPrimary"></button>
        <button class="btn ghost" id="bossResultSecondary"></button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
