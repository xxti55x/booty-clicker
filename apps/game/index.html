<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Booty Clicker · Endless Twerk</title>
    <meta name="description" content="Booty Clicker — endloser Twerk-Idle-Clicker in Three.js." />
    <meta name="theme-color" content="#07070b" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🍑%3C/text%3E%3C/svg%3E"
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Booty Clicker · Endless Twerk" />
    <meta
      property="og:description"
      content="Twerke dich durch endlose Bühnen, rekrutiere deine Crew und werde zur Twerk-Legende."
    />
    <meta name="twitter:card" content="summary" />
  </head>
  <body>
    <div class="loading" id="loading">
      <div class="loading-emoji">
        <!-- Drawn peach mark — the actual logo, ink-outlined like the world. -->
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <defs>
            <linearGradient id="pgrad" x1="0" y1="0" x2="0.6" y2="1">
              <stop offset="0" stop-color="#ffd98a" />
              <stop offset="1" stop-color="#ff8d5e" />
            </linearGradient>
          </defs>
          <path
            fill="url(#pgrad)"
            stroke="#141021"
            stroke-width="1.5"
            stroke-linejoin="round"
            d="M12 7.2C9.6 3.9 3.4 5.4 3.9 10.8 4.3 15.6 8 19.6 12 19.6s7.7-4 8.1-8.8C20.6 5.4 14.4 3.9 12 7.2Z"
          />
          <path
            fill="none"
            stroke="#141021"
            stroke-width="1.3"
            stroke-linecap="round"
            d="M12 8c-.5 3.5-.4 7.6.4 11.2"
          />
          <path
            fill="#7fbf3f"
            stroke="#141021"
            stroke-width="1.3"
            stroke-linejoin="round"
            d="M12.3 6.7c.3-2.4 2.1-3.8 4.5-3.7-.2 2.3-1.9 3.9-4.5 3.7Z"
          />
        </svg>
      </div>
      <div class="loading-title">Booty<em>Clicker</em></div>
      <div class="loading-sub">lädt…</div>
    </div>
    <canvas id="app"></canvas>
    <div class="fx vignette"></div>
    <div class="fx grain"></div>

    <div class="topui">
      <div class="hud">
        <div class="hud-card">
          <div class="zonestrip" id="zoneStrip"></div>
          <div class="hud-top">
            <div class="zone">
              Bühne <span id="zone">1</span> <span class="zone-kind" id="zoneKind"></span>
            </div>
          </div>
          <div class="bp"><span id="gold">0</span><span class="bp-unit">BP</span></div>
          <div class="stats" id="stats">DPS 0 · Klick 1</div>
          <div class="combo" id="combo"></div>
          <div class="ngplus hidden" id="souls"></div>
        </div>
      </div>

      <div class="rival" id="rival">
        <div class="rival-card">
          <div class="rival-name" id="rivalName">Groupie</div>
          <div class="rival-hpbar"><div class="rival-hpfill" id="rivalHpFill"></div></div>
          <div class="rival-row">
            <span class="rival-hp" id="rivalHpText">10 / 10</span>
            <span class="rival-prog" id="zoneProgress">0 / 10</span>
            <span class="rival-timer hidden" id="rivalTimer">30</span>
          </div>
        </div>
      </div>
    </div>

    <button class="toggleShop" id="toggleShop">
      <svg class="ui-ic" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="4.6" r="2.1" />
        <path d="M12 7.4v5.2M12 12.6 8.6 19M12 12.6 15.4 19M11.9 9.6 7.4 6.9M12.1 9.6l4.5-2.7" />
      </svg>
      <span>Crew</span>
    </button>
    <button class="muteBtn" id="muteBtn" title="Ton an/aus">
      <svg class="ui-ic" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4.5 9.6v4.8h3.4l4.6 3.8V5.8L7.9 9.6Z" />
        <path class="ic-wv" d="M15.5 9.3a3.8 3.8 0 0 1 0 5.4M18 7a7.2 7.2 0 0 1 0 10" />
        <path class="ic-x" d="m16.5 9.8 4.4 4.4M20.9 9.8l-4.4 4.4" />
      </svg>
    </button>

    <!-- Golden-Peach on-screen button (§6.1) + ×2-boost HUD badge (B13c). -->
    <button class="peachBtn hidden" id="peachBtn" type="button" title="Goldenen Pfirsich fangen!">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path
          fill="#ffd24d"
          stroke="#141021"
          stroke-width="1.5"
          stroke-linejoin="round"
          d="M12 7.2C9.6 3.9 3.4 5.4 3.9 10.8 4.3 15.6 8 19.6 12 19.6s7.7-4 8.1-8.8C20.6 5.4 14.4 3.9 12 7.2Z"
        />
        <path
          fill="none"
          stroke="#141021"
          stroke-width="1.3"
          stroke-linecap="round"
          d="M12 8c-.5 3.5-.4 7.6.4 11.2"
        />
        <path
          fill="#7fbf3f"
          stroke="#141021"
          stroke-width="1.3"
          stroke-linejoin="round"
          d="M12.3 6.7c.3-2.4 2.1-3.8 4.5-3.7-.2 2.3-1.9 3.9-4.5 3.7Z"
        />
      </svg>
    </button>
    <div class="boostBadge hidden" id="boostBadge">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path
          fill="#ff8d5e"
          stroke="#141021"
          stroke-width="1.6"
          stroke-linejoin="round"
          d="M12 7.2C9.6 3.9 3.4 5.4 3.9 10.8 4.3 15.6 8 19.6 12 19.6s7.7-4 8.1-8.8C20.6 5.4 14.4 3.9 12 7.2Z"
        />
      </svg>
      <span>×2 Boost</span>
    </div>

    <div class="abilitybar" id="abilityBar">
      <button class="ability-btn" id="ekstaseBtn" type="button" title="Twerk-Ekstase (Taste F)">
        <span class="ability-fill" id="ekstaseFill"></span>
        <span class="ability-label" id="ekstaseLabel">🍑 Ekstase</span>
      </button>
    </div>

    <div class="hintbar">Klick / Leertaste = Twerken &amp; Schaden · Crew macht Idle-DPS</div>
    <div class="toasts" id="toasts"></div>

    <div class="coach hidden" id="coach">
      <div class="coach-text" id="coachText"></div>
      <div class="coach-row">
        <span class="coach-dots" id="coachDots"></span>
        <button class="coach-btn" id="coachNext" type="button">Weiter</button>
      </div>
    </div>

    <div class="shop" id="shop">
      <!-- One hand-drawn stroke-icon set (24px grid, currentColor) — no emoji. -->
      <div class="tabs">
        <div class="tab active" data-t="crew" title="Crew">
          <svg class="tab-ic" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="4.6" r="2.1" />
            <path
              d="M12 7.4v5.2M12 12.6 8.6 19M12 12.6 15.4 19M11.9 9.6 7.4 6.9M12.1 9.6l4.5-2.7"
            />
          </svg>
          <span class="tab-lb">Crew</span>
        </div>
        <div class="tab" data-t="gear" title="Gear / Skins">
          <svg class="tab-ic" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9 4 4.5 6.8l1.7 3 1.8-.9V20h8V8.9l1.8.9 1.7-3L15 4a3 3 0 0 1-6 0Z" />
          </svg>
          <span class="tab-lb">Skins</span>
        </div>
        <div class="tab" data-t="anc" title="Ahnen">
          <svg class="tab-ic" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M12.4 13.3a1.5 1.5 0 0 1-2.2-1.9 3 3 0 0 1 4-.9 4.5 4.5 0 0 1 1.3 6 6.3 6.3 0 0 1-8.4 1.8A8.1 8.1 0 0 1 4.6 7.4a10 10 0 0 1 13-2.4"
            />
          </svg>
          <span class="tab-lb">Ahnen</span>
        </div>
        <div class="tab" data-t="pr" title="Ruhm">
          <svg class="tab-ic" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3.4 13.9 10l6.7 2-6.7 2L12 20.6 10.1 14l-6.7-2 6.7-2Z" />
          </svg>
          <span class="tab-lb">Ruhm</span>
        </div>
        <div class="tab" data-t="heaven" title="Himmel">
          <svg class="tab-ic" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 16.5a8 8 0 0 1 16 0M7.6 16.5a4.4 4.4 0 0 1 8.8 0" />
            <circle cx="4" cy="17.6" r="0.4" />
            <circle cx="20" cy="17.6" r="0.4" />
          </svg>
          <span class="tab-lb">Himmel</span>
        </div>
        <div class="tab" data-t="transcend" title="Transzendenz">
          <svg class="tab-ic" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7.5 4.5h9l3.8 4.6L12 19.8 3.7 9.1Z" />
            <path d="M3.7 9.1h16.6M12 19.8 8.8 9.1 12 4.5l3.2 4.6Z" />
          </svg>
          <span class="tab-lb">Trans.</span>
        </div>
        <div class="tab" data-t="chest" title="Truhen">
          <svg class="tab-ic" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 11.4a8 6.6 0 0 1 16 0V19H4ZM4 11.4h16M12 11.4v3.4" />
          </svg>
          <span class="tab-lb">Truhen</span>
        </div>
        <div class="tab" data-t="meta" title="Ziele">
          <svg class="tab-ic" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6.2 3.5V21M6.2 4.8c3.6-2 6.8 1.8 11.6.2v8.2c-4.8 1.6-8-2.2-11.6-.2" />
          </svg>
          <span class="tab-lb">Ziele</span>
        </div>
        <div class="tab" data-t="set" title="Einstellungen">
          <svg class="tab-ic" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 8.2h4M12 8.2h8M4 15.8h9M17 15.8h3" />
            <circle cx="10" cy="8.2" r="2" />
            <circle cx="15" cy="15.8" r="2" />
          </svg>
          <span class="tab-lb">Mehr</span>
        </div>
      </div>
      <div class="tabbody" id="tabCrew"></div>
      <div class="tabbody" id="tabGear" style="display: none"></div>
      <div class="tabbody" id="tabAnc" style="display: none"></div>
      <div class="tabbody" id="tabPr" style="display: none"></div>
      <div class="tabbody" id="tabHeaven" style="display: none"></div>
      <div class="tabbody" id="tabTranscend" style="display: none"></div>
      <div class="tabbody" id="tabChest" style="display: none"></div>
      <div class="tabbody" id="tabMeta" style="display: none"></div>
      <div class="tabbody" id="tabSet" style="display: none"></div>
    </div>

    <div class="overlay hidden" id="welcomeBack">
      <div class="dialog">
        <div class="dt">🍑 Willkommen zurück!</div>
        <div class="dd" id="wbText"></div>
        <button class="btn" id="wbClose">Einsammeln</button>
      </div>
    </div>

    <!-- Leaderboard v2 (§7.4): best-zone submit + top-50 overlays. -->
    <div class="overlay hidden" id="lbSubmit">
      <div class="dialog">
        <div class="dt">🏅 Bestenliste</div>
        <div class="dd" id="lbSubmitText"></div>
        <input class="lb-input" id="lbNick" maxlength="16" placeholder="Nickname (2–16 Zeichen)" />
        <div class="msg" id="lbMsg"></div>
        <button class="btn" id="lbSubmitBtn" type="button">Absenden</button>
        <button class="btn ghost" id="lbSkipBtn" type="button">Überspringen</button>
      </div>
    </div>
    <div class="overlay hidden" id="lbTop">
      <div class="dialog wide">
        <div class="dt">🏅 Top 50</div>
        <div class="lb-list" id="lbList"></div>
        <button class="btn" id="lbClose" type="button">Schließen</button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
