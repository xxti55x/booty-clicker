name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier (format check)
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Check bundle size (< 5 MB)
        run: |
          SIZE=$(du -sk apps/game/dist | cut -f1)
          echo "dist size: ${SIZE} KB"
          if [ "$SIZE" -gt 5120 ]; then
            echo "::error::Build output ${SIZE} KB exceeds 5 MB budget"
            exit 1
          fi
