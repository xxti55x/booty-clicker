name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier (format check)
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: Unit tests (game + api)
        run: npm test

      - name: Endless simulation gate (E1/E2/E4 + pacing, §9.5)
        run: npm run test:sim

      - name: Typecheck API worker
        run: npm run typecheck -w apps/api

      - name: Build
        run: npm run build

      - name: Check bundle size (< 5 MB)
        run: |
          SIZE=$(du -sk apps/game/dist | cut -f1)
          echo "dist size: ${SIZE} KB"
          if [ "$SIZE" -gt 5120 ]; then
            echo "::error::Build output ${SIZE} KB exceeds 5 MB budget"
            exit 1
          fi

  deploy-pages:
    name: Deploy to Cloudflare Pages
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Skip the deploy (rather than fail CI) when the repo has no Cloudflare
      # secrets configured — the game itself is fully playable without a deploy.
      - name: Check Cloudflare secrets
        id: cf
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLOUDFLARE_API_TOKEN not set — skipping Pages deploy."
          fi

      - name: Publish to Cloudflare Pages
        if: steps.cf.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/game/dist --project-name=booty-clicker --branch=main
